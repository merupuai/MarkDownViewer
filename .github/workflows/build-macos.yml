name: Build macOS .app

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14   # Apple Silicon
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (stable, macos-arm64)
        run: bun x electrobun build --env=stable

      - name: Pack .app bundle as zip
        run: |
          cd build/stable-macos-arm64
          zip -ry "../../MarkdownViewer-macos-arm64.zip" "Markdown Viewer.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarkdownViewer-macos-arm64
          path: MarkdownViewer-macos-arm64.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: MarkdownViewer-macos-arm64.zip
          generate_release_notes: true
