name: Build macOS .app

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14   # Apple Silicon
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ">=1.3.0"

      - name: Install dependencies (frozen lockfile)
        # M2.S1 (closes DEBT-003): frozen-lockfile guarantees CI installs the
        # exact resolution committed in bun.lock. Any drift fails the build.
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Design-token alignment check
        # M2.S8 (closes DESIGN-001): every CSS custom property in
        # src/mainview/index.css MUST be mapped in design-token-mapping.json
        # or listed as app-local. Drift fails the build.
        run: bun run design:check

      - name: Unit tests
        run: bun test tests/unit/

      - name: Dependency vulnerability scan
        # M2.S2 (closes SCA-002 / MOD-009 / FR-11 / SR-07): runs on every PR
        # and tag. --audit-level=high → fail on any HIGH or CRITICAL CVE.
        # Waivers go in .security-waivers.json (per IR-11-03; not yet
        # consumed — leave a TODO for the waiver-aware audit step).
        run: bun audit --audit-level=high

      - name: Build (stable, macos-arm64)
        run: bun x electrobun build --env=stable

      # ────────────────────────────────────────────────────────────────────
      # M2.S4 (FR-09 mac, SR-08): code-sign + notarize + staple. Tagged
      # release builds only — daily PR builds skip to keep CI fast and to
      # avoid exposing signing certs to PR-author code paths.
      #
      # Required GitHub Actions secrets (USER must configure):
      #   APPLE_DEVELOPER_ID_CERT      — base64-encoded .p12 of the Developer
      #                                  ID Application certificate
      #   APPLE_DEVELOPER_ID_PASSWORD  — password for that .p12
      #   APPLE_NOTARIZE_APPLE_ID      — Apple ID email used for notarization
      #   APPLE_NOTARIZE_TEAM_ID       — 10-character team ID
      #   APPLE_NOTARIZE_PASSWORD      — app-specific password (notarytool)
      #
      # See https://developer.apple.com/documentation/security/notarizing-macos-software-before-distribution
      # ────────────────────────────────────────────────────────────────────
      - name: Import signing certificate
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_DEVELOPER_ID_CERT: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
          APPLE_DEVELOPER_ID_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID_CERT" ]; then
            echo "::warning::APPLE_DEVELOPER_ID_CERT not configured — skipping signing. Configure repo secrets to enable."
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/release.keychain
          KEYCHAIN_PASS=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          echo -n "$APPLE_DEVELOPER_ID_CERT" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_DEVELOPER_ID_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | xargs)
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

      - name: Sign .app
        if: startsWith(github.ref, 'refs/tags/v') && env.APPLE_DEVELOPER_ID_CERT != ''
        env:
          APPLE_DEVELOPER_ID_CERT: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
        run: |
          IDENTITY=$(security find-identity -v -p codesigning $RUNNER_TEMP/release.keychain | awk '/Developer ID Application/ {print $2; exit}')
          codesign --deep --force --options runtime --timestamp \
            --sign "$IDENTITY" "build/stable-macos-arm64/Markdown Viewer.app"
          codesign --verify --deep --strict --verbose=2 "build/stable-macos-arm64/Markdown Viewer.app"

      - name: Notarize + staple
        if: startsWith(github.ref, 'refs/tags/v') && env.APPLE_DEVELOPER_ID_CERT != ''
        env:
          APPLE_DEVELOPER_ID_CERT: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
          APPLE_NOTARIZE_APPLE_ID: ${{ secrets.APPLE_NOTARIZE_APPLE_ID }}
          APPLE_NOTARIZE_TEAM_ID: ${{ secrets.APPLE_NOTARIZE_TEAM_ID }}
          APPLE_NOTARIZE_PASSWORD: ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
        run: |
          # Notarize the .app inside a zip (Apple's recommended flow for .app
          # bundles distributed outside the Mac App Store).
          cd build/stable-macos-arm64
          ditto -c -k --keepParent "Markdown Viewer.app" notarize.zip
          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_NOTARIZE_APPLE_ID" \
            --team-id "$APPLE_NOTARIZE_TEAM_ID" \
            --password "$APPLE_NOTARIZE_PASSWORD" \
            --wait --timeout 30m
          xcrun stapler staple "Markdown Viewer.app"
          xcrun stapler validate "Markdown Viewer.app"
          rm notarize.zip

      - name: Pack .app bundle as zip
        run: |
          cd build/stable-macos-arm64
          zip -ry "../../MarkdownViewer-macos-arm64.zip" "Markdown Viewer.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarkdownViewer-macos-arm64
          path: MarkdownViewer-macos-arm64.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: MarkdownViewer-macos-arm64.zip
          generate_release_notes: true
